services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: cflt-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROM_RETENTION_TIME:-180d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./.cflt-local/prometheus:/etc/prometheus
      - prometheus_data:/prometheus

  dashboard:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: cflt-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PROMETHEUS_CONFIG_PATH=/prometheus/prometheus.yml
      - PROMETHEUS_URL=http://prometheus:9090
      - CLUSTERS_CONFIG_PATH=/data/clusters_config.json
    volumes:
      - ./.cflt-local/prometheus:/prometheus
      - ./.cflt-local/data:/data

volumes:
  prometheus_data:

