    iam.v2.CertificateAuthority:
      type: object
      description: |
        `CertificateAuthority` objects represent signing certificate authorities in Confluent Cloud.

        The API allows you to list, create, read, update, and delete your Certificate Authority.
      properties:
        api_version:
          type: string
          enum:
            - iam/v2
          description: APIVersion defines the schema version of this representation
            of a resource.
          readOnly: true
        kind:
          type: string
          description: Kind defines the object this REST resource represents.
          readOnly: true
          enum:
            - CertificateAuthority
        id:
          description: ID is the "natural identifier" for an object within its scope/namespace;
            it is normally unique across time but not space. That is, you can assume
            that the ID will not be reclaimed and reused after an object is deleted
            ("time"); however, it may collide with IDs for other object `kinds` or
            objects of the same `kind` within a different scope/namespace ("space").
          type: string
          maxLength: 255
          readOnly: true
          example: dlz-f3a90de
        metadata:
          allOf:
            - $ref: '#/components/schemas/ObjectMeta'
            - properties:
                self:
                  example: https://api.confluent.cloud/iam/v2/certificate-authorities/op-12345
                resource_name:
                  example: crn://confluent.cloud/organization=9bb441c4-edef-46ac-8a41-c49e44a3fd9a/certificate-authority=op-12345
        display_name:
          type: string
          description: The human-readable name of the certificate authority.
          example: My Certificate Authority
        description:
          type: string
          description: A description of the certificate authority.
          example: Sample description text
        fingerprints:
          type: array
          items:
            type: string
          description: |-
            The fingerprints for each certificate in the certificate chain. These are SHA-1 encoded
            strings that act as unique identifiers for the certificates in the chain.
          example: [B1BC968BD4f49D622AA89A81F2150152A41D829C]
          readOnly: true
        expiration_dates:
          type: array
          items:
            type: string
            format: date-time
          description: The expiration dates of certificates in the chain.
          example: [2017-07-21T17:32:28Z]
          readOnly: true
        serial_numbers:
          type: array
          items:
            type: string
          description: |-
            The serial numbers for each certificate in the certificate chain.
          example: [219C542DE8f6EC7177FA4EE8C3705797]
          readOnly: true
        certificate_chain_filename:
          type: string
          description: The file name of the uploaded pem file for this certificate
            authority.
          example: certificate.pem
          readOnly: true
        crl_source:
          type: string
          description: |-
            The source specifies whether the Certificate Revocation List (CRL) is updated from
            either local file uploaded (LOCAL) or from url of CRL (URL).
          x-extensible-enum: [LOCAL, URL]
          example: LOCAL
          readOnly: true
        crl_url:
          type: string
          format: uri
          description: |-
            The url from which to fetch the CRL for the certificate authority if crl_source is URL.
          readOnly: true
        crl_updated_at:
          type: string
          format: date-time
          description: The timestamp for when CRL was last updated.
          example: 2017-07-21T17:32:28Z
          readOnly: true
        state:
          type: string
          x-extensible-enum:
            - ENABLED
          description: The current state of the certificate authority.
          example: ENABLED
          readOnly: true
