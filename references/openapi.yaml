              AzureNetwork: '#/components/schemas/networking.v1.AzureNetwork'
          readOnly: true
        idle_since:
          type: string
          format: date-time
          example: 2024-01-01T00:00:00Z
          description: The date and time when the network becomes idle
          readOnly: true
      readOnly: true
