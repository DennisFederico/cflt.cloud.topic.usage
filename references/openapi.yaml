        - $ref: '#/components/schemas/sql.v1.ColumnCommon'
        - type: object
          required:
            - kind
          properties:
            name:
              example: user_id
            type:
              example:
                type: BIGINT
                nullable: false
            kind:
              type: string
              description: The kind of column.
              enum: [Physical]
              example: Physical

    sql.v1.MetadataColumn:
      description: Metadata columns reference system properties.
      allOf:
        - $ref: '#/components/schemas/sql.v1.ColumnCommon'
        - type: object
          required:
            - kind
            - metadata_key
          properties:
            name:
              example: table_offset
            type:
              example:
                type: BIGINT
                nullable: false
            kind:
              type: string
              description: The kind of column.
              enum: [Metadata]
              example: Metadata
            metadata_key:
              type: string
              description: The system metadata key to reference.
              example: offset
            virtual:
              type: boolean
              description: Indicates if the metadata column is virtual.
