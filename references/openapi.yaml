paths:
  /iam/v2/api-keys:
    x-lifecycle-stage: General Availability
    x-self-access: true
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listIamV2ApiKeys
      summary: List of API Keys
      description: |
        [![General Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)

        Retrieve a sorted, filtered, paginated list of all API keys.

        This can show all keys for a single owner (across resources - Kafka clusters), or all keys for a single
        resource (across owners). If no `owner` or `resource` filters are specified, returns all API Keys in the
        organization. You will only see the keys that are accessible to the account making the API request.
      parameters:
        - name: spec.owner
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          description: Filter the results by exact match for spec.owner.
        - name: spec.resource
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          description: Filter the results by exact match for spec.resource.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - API Keys (iam/v2)
      security:
        - cloud-api-key: []
      responses:
        '200':
          description: API Key.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/iam.v2.ApiKeyList'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          properties:
                            spec:
                              type: object
                              properties:
                                owner:
                                  example:
                                    id: u-a83k9b
                                    related: https://api.confluent.cloud/iam/v2/users/u-a83k9b
                                    resource_name: https://api.confluent.cloud/user=u-a83k9b
                                resource:
                                  nullable: true
                                  example:
                                    id: lkc-c29js0
                                    related: https://api.confluent.cloud/cmk/v2/clusters/lkc-c29js0
                                    resource_name: https://api.confluent.cloud/organization=9bb441c4-edef-46ac-8a41-c49e44a3fd9a/environment=env-abc123/cloud-cluster=lkc-c29js0
          headers:
            X-Request-Id:
              schema:
                type: string
              description: The unique identifier for the API request.
            X-RateLimit-Limit:
              schema:
                type: integer
              description: The maximum number of requests you're permitted to make
                per time period.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: The number of requests remaining in the current rate limit
                window.
            X-RateLimit-Reset:
              schema:
                type: integer
              description: "The relative time in seconds until the current rate-limit\
                \ window resets.  \n  \n**Important:** This differs from Github and\
                \ Twitter's same-named header which uses UTC epoch seconds. We use\
                \ relative time to avoid client/server time synchronization issues."
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/DefaultSystemError'
    post:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: createIamV2ApiKey
      summary: Create an API Key
      description: |-
        [![General Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)

        Make a request to create an API key.
      tags:
        - API Keys (iam/v2)
      security:
        - cloud-api-key: []
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/iam.v2.ApiKey'
                - type: object
                  required:
                    - spec
                  properties:
                    spec:
                      type: object
                      required:
                        - owner
                - type: object
                  properties:
                    spec:
                      type: object
                      properties:
                        owner:
                          example:
                            id: u-a83k9b
                        resource:
                          nullable: true
                          example:
                            id: lkc-c29js0
      responses:
        '202':
          description: An API Key is being created.
          headers:
            X-Request-Id:
              schema:
                type: string
              description: The unique identifier for the API request.
            X-RateLimit-Limit:
              schema:
                type: integer
              description: The maximum number of requests you're permitted to make
                per time period.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: The number of requests remaining in the current rate limit
                window.
            X-RateLimit-Reset:
              schema:
                type: integer
              description: "The relative time in seconds until the current rate-limit\
                \ window resets.  \n  \n**Important:** This differs from Github and\
