          example: MATERIALIZED_TABLE
        environment_locator:
          type: string
          description: The environment containing the resource. Can be either the
            environment name or ID, depending on how it is referenced in the SQL statement
            text.
          example: env-abc
        database_locator:
          type: string
          description: The database containing the resource. Can be either the database
            name or ID, depending on how it is referenced in the SQL statement text.
          example: lkc-123
        name:
          type: string
          description: The name of the resource, unique within its scope (environment
            and database).
          example: orders
        details:
          type: array
