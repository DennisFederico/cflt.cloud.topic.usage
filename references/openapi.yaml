                nullable: false
                precision: 10
                scale: 2
            kind:
              type: string
              description: The kind of column.
              enum: [Computed]
              example: Computed
            expression:
              type: string
              description: The SQL expression used to compute the column value.
              example: quantity * price
            virtual:
              type: boolean
              description: Indicates if the computed column is virtual.
              default: false
              example: true

