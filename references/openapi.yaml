        - routes
        - customer_region
      properties:
        kind:
          description: Peering kind type.
          type: string
          enum: [AwsPeering]
        account:
          type: string
          pattern: ^\d{12}$
          example: '000000000000'
          description: The AWS account ID associated with the VPC you are peering
